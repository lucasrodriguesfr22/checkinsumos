<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhes</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/nNgyj0XS/icone-checkinsumos.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .ficha { background: #1e1e1e; padding: 20px; border-radius: 10px; border-top: 6px solid #F40009; }
        .btn-share { width: 100%; background: #25D366; color: white; border: none; padding: 15px; margin-top: 10px; border-radius: 5px; font-weight: bold; }
        body.light-mode { background: #f4f4f4; color: #121212; }
        body.light-mode .ficha { background: #ffffff; color: #121212; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <button onclick="history.back()">⬅ Voltar</button>
    <div id="ficha" class="ficha">Carregando...</div>
    <button class="btn-share" id="btn-share" onclick="compartilhar()">📤 Compartilhar</button>

    <script>
        const dataParam = new URLSearchParams(window.location.search).get('data');
        if (dataParam) {
            const cols = JSON.parse(decodeURIComponent(dataParam));
            
            // Lógica de resgate: busca na coluna 8, se não achar, busca na 7, depois na 9.
            // Exibe SEMPRE o conteúdo bruto, sem filtros ou formatação.
            const loteReal = cols[8] || cols[7] || cols[9] || '-';

            document.getElementById('ficha').innerHTML = `
                <h2>${cols[1] || '-'}</h2>
                <p><strong>Tipo:</strong> ${cols[0] || '-'}</p>
                <p><strong>Nota Fiscal:</strong> ${cols[7] || '-'}</p>
                <p><strong>Lote:</strong> ${loteReal}</p>
                <p><strong>Validade:</strong> ${cols[5] || '-'}</p>
                <p><strong>Situação:</strong> ${cols[6] || '-'}</p>
            `;
            document.getElementById('btn-share').style.display = 'block';
        }

        async function compartilhar() {
            const btn = document.getElementById('btn-share');
            btn.style.display = 'none';
            const canvas = await html2canvas(document.getElementById('ficha'));
            const dataUrl = canvas.toDataURL("image/png");
            try {
                const blob = await (await fetch(dataUrl)).blob();
                await navigator.share({ files: [new File([blob], 'ficha.png', {type: 'image/png'})] });
            } catch(e) { 
                document.getElementById('ficha').innerHTML = `<img src="${dataUrl}" style="width:100%">`;
            }
            btn.style.display = 'block';
        }
    </script>
</body>
</html>
