<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkinsumos</title>
    <style>
        /* Estilos base e Modo Escuro (Padrão) */
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; transition: background 0.3s, color 0.3s; }
        header { background: #F40009; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; }
        
        /* Estilos do Modo Claro */
        body.light-mode { background: #f4f4f4; color: #121212; }
        body.light-mode .card { background: #ffffff; border: 1px solid #ccc; color: #121212; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        
        /* Layout fixo dos cards para não quebrar a tela */
        .card { 
            background: #1e1e1e; border-radius: 12px; text-align: center; 
            padding: 15px; border: 1px solid #333; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: background 0.3s, border 0.3s, color 0.3s;
        }
        
        /* Tamanho fixo das imagens */
        .card img { 
            width: 90px; height: 90px; object-fit: contain; margin-bottom: 10px; 
            background-color: transparent; 
        }
        
        .card div { font-weight: bold; font-size: 13px; margin-top: 5px; }

        /* Botão de Tema */
        .theme-btn { text-align: center; margin: 15px; cursor: pointer; font-weight: bold; padding: 12px; background: #333; border-radius: 8px; color: white; transition: 0.3s; }
        body.light-mode .theme-btn { background: #ddd; color: #121212; }
    </style>
</head>
<body>
    <header>Checkinsumos</header>
    
    <!-- Botão de alternar tema -->
    <div class="theme-btn" onclick="toggleTheme()">☀️/🌙 Alterar Tema</div>

    <div class="grid">
        
        <div class="card" onclick="window.location.href='lista.html?tipo=Rótulo'">
            <img src="https://i.ibb.co/qYKFTNrp/rotulo-foto.webp" alt="Rótulo">
            <div>RÓTULO</div>
        </div>
        
        <div class="card" onclick="window.location.href='lista.html?tipo=Filme'">
            <img src="https://i.ibb.co/JRvk2kds/foto-filme-decorado.webp" alt="Filme">
            <div>FILME DECORADO</div>
        </div>
        
        <div class="card" onclick="window.location.href='lista.html?tipo=Lata'">
            <img src="https://i.ibb.co/23wS70YF/lata-foto.jpg" alt="Lata">
            <div>LATA</div>
        </div>
        
        <div class="card" onclick="window.location.href='lista.html?tipo=Tampa Plástica'">
            <img src="https://i.ibb.co/Xr6phwX6/foto-tampa-plastica.jpg" alt="Tampa Plástica">
            <div>TAMPA PLÁSTICA</div>
        </div>
        
        <div class="card" onclick="window.location.href='lista.html?tipo=Rolha'">
            <img src="https://i.ibb.co/7NWCVYmm/rolha.webp" alt="Rolha">
            <div>ROLHA METÁLICA</div>
        </div>
        
        <div class="card" onclick="window.location.href='lista.html?tipo=Tampa Lata'">
            <img src="https://i.ibb.co/JW34cP24/tampa-lata.jpg" alt="Tampa Lata">
            <div>TAMPA PARA LATA</div>
        </div>
        
    </div>

    <script>
        // Função para alternar o tema e salvar a preferência no navegador
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            // Salva a escolha do usuário na memória do celular/navegador
            if (document.body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
        }

        // Verifica a preferência salva assim que o app carrega
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>
</html>
