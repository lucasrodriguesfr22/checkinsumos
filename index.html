<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkinsumos</title>
    <style>
        :root { --primary: #F40009; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        header { background: var(--primary); padding: 15px; font-weight: bold; font-size: 20px; text-align: center; }
        .container { padding: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
        .status { font-weight: bold; }
        .aprovado { color: #4CAF50; }
        .reprovado { color: #f44336; }
    </style>
</head>
<body>
    <header>Checkinsumos</header>
    <div class="container">
        <input type="text" id="search" placeholder="🔍 Buscar lote, produto ou nota...">
        <div id="results"></div>
    </div>

    <script>
        // SUBSTITUA O LINK ABAIXO PELO SEU LINK CSV PUBLICADO
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWOWdtUog954LY_EmvbNUuqBKNBrkw_NamLje4xHyOjL46iV-XYCIsekzlJPV4q7dmBDC6oSTsHs6q/pub?gid=126364406&single=true&output=csv';

        fetch(CSV_URL)
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').slice(1);
                const container = document.getElementById('results');
                const search = document.getElementById('search');

                function render(term = '') {
                    container.innerHTML = rows
                        .filter(row => row.trim() !== '' && !row.includes('#ERROR!'))
                        .filter(row => row.toLowerCase().includes(term.toLowerCase()))
                        .map(row => {
                            const cols = row.split(',');
                            if (cols.length < 7) return '';
                            
                            // Índices baseados na sua nova BASE GERAL:
                            // 0: Tipo | 1: Produto | 3: NF | 4: Lote | 6: Status
                            return `
                                <div class="card">
                                    <small style="color: #888;">${cols[0]}</small><br>
                                    <strong>${cols[1]}</strong><br>
                                    Lote: ${cols[4]} | NF: ${cols[3]}<br>
                                    <span class="status ${cols[6].toLowerCase().includes('aprovado') ? 'aprovado' : 'reprovado'}">${cols[6]}</span>
                                </div>`;
                        }).join('');
                }
                search.oninput = (e) => render(e.target.value);
                render();
            });
    </script>
</body>
</html>
