<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Checkinsumos</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; }
        header { background: #F40009; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #1e1e1e; border-radius: 8px; text-align: center; padding: 15px; border: 1px solid #333; cursor: pointer; }
        .card div { margin-top: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <header>Checkinsumos</header>
    <div class="grid">
        <div class="card" onclick="window.location.href='lista.html?tipo=Rótulo'"><div>RÓTULO</div></div>
        <div class="card" onclick="window.location.href='lista.html?tipo=Filme'"><div>FILME DECORADO</div></div>
        <div class="card" onclick="window.location.href='lista.html?tipo=Lata'"><div>LATA</div></div>
        <div class="card" onclick="window.location.href='lista.html?tipo=Tampa Plástica'"><div>TAMPA PLÁSTICA</div></div>
        <div class="card" onclick="window.location.href='lista.html?tipo=Rolha'"><div>ROLHA METÁLICA</div></div>
        <div class="card" onclick="window.location.href='lista.html?tipo=Tampa Lata'"><div>TAMPA PARA LATA</div></div>
    </div>
</body>
</html>
