<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkinsumos</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: none; background: #333; color: white; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #F40009; }
        .aprovado { color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Checkinsumos</h2>
    <input type="text" id="search" placeholder="Buscar por Lote ou Produto...">
    <div id="results"></div>

    <script>
        fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTWOWdtUog954LY_EmvbNUuqBKNBrkw_NamLje4xHyOjL46iV-XYCIsekzlJPV4q7dmBDC6oSTsHs6q/pubhtml?gid=126364406&single=true')
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n');
                const search = document.getElementById('search');
                search.oninput = () => {
                    const term = search.value.toLowerCase();
                    document.getElementById('results').innerHTML = rows.filter(row => row.toLowerCase().includes(term)).map(row => {
                        const cols = row.split(',');
                        return `<div class="card"><strong>${cols[1]}</strong><br>Lote: ${cols[4]}<br><span class="aprovado">${cols[6]}</span></div>`;
                    }).join('');
                };
            });
    </script>
</body>
</html>
