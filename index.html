<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkinsumos</title>
    <style>
        :root { --primary: #F40009; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        header { background: var(--primary); padding: 15px; font-weight: bold; font-size: 20px; text-align: center; }
        .container { padding: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
        .status-aprovado { color: #4CAF50; font-weight: bold; }
        .status-reprovado { color: #f44336; font-weight: bold; }
        .label { color: #aaa; font-size: 0.8em; }
    </style>
</head>
<body>
    <header>Checkinsumos</header>
    <div class="container">
        <input type="text" id="search" placeholder="🔍 Buscar lote, produto ou nota...">
        <div id="results"></div>
    </div>

    <script>
        // Substitua o link abaixo pelo link do seu CSV publicado
        const CSV_URL = 'LINK_DO_SEU_CSV_AQUI';

        fetch(CSV_URL)
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n').slice(1); // Ignora cabeçalho
                const container = document.getElementById('results');
                const search = document.getElementById('search');

                function render(term = '') {
                    container.innerHTML = lines.filter(row => row.toLowerCase().includes(term.toLowerCase())).map(row => {
                        const cols = row.split(',');
                        if(cols.length < 8) return '';
                        const statusClass = cols[6].toLowerCase().includes('aprovado') ? 'status-aprovado' : 'status-reprovado';
                        return `
                            <div class="card">
                                <div class="label">${cols[0]}</div>
                                <strong>${cols[1]}</strong><br>
                                Lote: ${cols[4]} | NF: ${cols[3]}<br>
                                <span class="${statusClass}">${cols[6]}</span>
                            </div>`;
                    }).join('');
                }
                search.oninput = (e) => render(e.target.value);
                render();
            });
    </script>
</body>
</html>
