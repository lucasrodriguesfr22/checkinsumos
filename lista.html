<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta</title>

    <link rel="icon" type="image/png" href="https://i.ibb.co/nNgyj0XS/icone-checkinsumos.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/nNgyj0XS/icone-checkinsumos.png">

    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 15px; transition: background 0.3s, color 0.3s; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #F40009; cursor: pointer; transition: background 0.3s, color 0.3s, transform 0.1s; }
        .card:active { transform: scale(0.98); } 
        
        .aprovado { color: #4CAF50; font-weight: bold; }
        .reprovado { color: #f44336; font-weight: bold; }
        
        button { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s, color 0.3s; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .theme-icon { font-size: 26px; cursor: pointer; user-select: none; margin-right: 5px; }
        .header-logo { height: 35px; border-radius: 8px; object-fit: contain; }

        body.light-mode { background: #f4f4f4; color: #121212; }
        body.light-mode .card { background: #ffffff; color: #121212; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 1px solid #ccc; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; }
        body.light-mode input { background: #ffffff; color: #121212; border: 1px solid #ccc; }
        body.light-mode button { background: #ddd; color: #121212; }
    </style>
</head>
<body>
    <div class="header-top">
        <button onclick="history.back()">⬅ Voltar</button>
        <img src="https://i.ibb.co/nNgyj0XS/icone-checkinsumos.png" class="header-logo" alt="Logo">
        <div class="theme-icon" onclick="toggleTheme()" id="theme-toggle">☀️</div>
    </div>
    
    <h2 id="titulo">Carregando...</h2>
    <input type="text" id="search" placeholder="🔍 Pesquisar lote ou produto...">
    <div id="results"></div>

    <script>
        const themeIcon = document.getElementById('theme-toggle');
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
                themeIcon.innerText = '🌙';
            } else {
                localStorage.setItem('theme', 'dark');
                themeIcon.innerText = '☀️';
            }
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.innerText = '🌙';
        }

        const params = new URLSearchParams(window.location.search);
        const tipoFiltro = params.get('tipo');
        document.getElementById('titulo').innerText = "Insumo: " + tipoFiltro;

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWOWdtUog954LY_EmvbNUuqBKNBrkw_NamLje4xHyOjL46iV-XYCIsekzlJPV4q7dmBDC6oSTsHs6q/pub?gid=126364406&single=true&output=csv'; 

        fetch(CSV_URL)
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').slice(1).filter(row => row.trim() !== '');
                const container = document.getElementById('results');
                const search = document.getElementById('search');

                const processedRows = rows.reverse();

                function render(term = '') {
                    const termoLimpo = term.toLowerCase().replace(/[.\-\s/]/g, '');

                    container.innerHTML = processedRows
                        .filter(row => {
                            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                            if (!cols[0]) return false;

                            const tipoProdutoPlanilha = cols[0].toLowerCase();
                            const filtroEscolhido = tipoFiltro.toLowerCase();

                            if (filtroEscolhido === 'lata') {
                                return tipoProdutoPlanilha.includes('lata') && !tipoProdutoPlanilha.includes('tampa');
                            }
                            if (filtroEscolhido === 'tampa lata' || filtroEscolhido === 'tampa para lata') {
                                return tipoProdutoPlanilha.includes('tampa') && tipoProdutoPlanilha.includes('lata');
                            }
                            return tipoProdutoPlanilha.includes(filtroEscolhido);
                        })
                        .filter(row => {
                            const linhaLimpa = row.toLowerCase().replace(/[.\-\s/]/g, '');
                            return linhaLimpa.includes(termoLimpo);
                        })
                        .map(row => {
                            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                            const rowData = encodeURIComponent(row);
                            
                            const formatarNumero = (str) => {
                                if (!str) return '-';
                                return /^[0-9.]+$/.test(str.trim()) ? str.replace(/\./g, '') : str;
                            };

                            const loteLimpo = formatarNumero(cols[4]);
                            const nfLimpa = formatarNumero(cols[3]);
                            
                            return `<div class="card" onclick="window.location.href='detalhes.html?data=' + '${rowData}'">
                                        <strong>${cols[1]}</strong><br>
                                        Lote: ${loteLimpo} | NF: ${nfLimpa}<br>
                                        <span class="${cols[6] && cols[6].toLowerCase().includes('aprovado') ? 'aprovado' : 'reprovado'}">${cols[6] || ''}</span>
                                    </div>`;
                        }).join('');
                }

                search.oninput = (e) => render(e.target.value);
                render();
            });
    </script>
</body>
</html>
