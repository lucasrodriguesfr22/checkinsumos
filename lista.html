<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/nNgyj0XS/icone-checkinsumos.png">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 15px; transition: background 0.3s, color 0.3s; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; transition: background 0.3s, color 0.3s; font-size: 16px; outline: none;}
        input:focus { border: 1px solid #F40009; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #F40009; cursor: pointer; transition: background 0.3s, color 0.3s, transform 0.1s; }
        .card:active { transform: scale(0.98); } 
        .aprovado { color: #4CAF50; font-weight: bold; }
        .reprovado { color: #f44336; font-weight: bold; }
        button { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s, color 0.3s; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .theme-icon { font-size: 26px; cursor: pointer; user-select: none; margin-right: 5px; }
        .header-logo { height: 35px; border-radius: 8px; object-fit: contain; }
        body.light-mode { background: #f4f4f4; color: #121212; }
        body.light-mode .card { background: #ffffff; color: #121212; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-right: 1px solid #ccc; border-top: 1px solid #ccc; border-bottom: 1px solid #ccc; }
        body.light-mode input { background: #ffffff; color: #121212; border: 1px solid #ccc; }
        body.light-mode button { background: #ddd; color: #121212; }
    </style>
</head>
<body>
    <div class="header-top">
        <button onclick="history.back()">⬅ Voltar</button>
        <img src="https://i.ibb.co/nNgyj0XS/icone-checkinsumos.png" class="header-logo" alt="Logo">
        <div class="theme-icon" onclick="toggleTheme()" id="theme-toggle">☀️</div>
    </div>
    
    <h2 id="titulo">Carregando...</h2>
    <input type="text" id="search" placeholder="🔍 Pesquisar lote ou produto...">
    <div id="results"></div>

    <script>
        const themeIcon = document.getElementById('theme-toggle');
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) { localStorage.setItem('theme', 'light'); themeIcon.innerText = '🌙'; } 
            else { localStorage.setItem('theme', 'dark'); themeIcon.innerText = '☀️'; }
        }
        if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); themeIcon.innerText = '🌙'; }

        const params = new URLSearchParams(window.location.search);
        const tipoFiltro = params.get('tipo');
        document.getElementById('titulo').innerText = "Insumo: " + tipoFiltro;

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWOWdtUog954LY_EmvbNUuqBKNBrkw_NamLje4xHyOjL46iV-XYCIsekzlJPV4q7dmBDC6oSTsHs6q/pub?gid=126364406&single=true&output=csv'; 

        // Leitor Seguro Restaurado
        function lerCSV(texto) {
            let linhas = [], celula = "", emAspas = false, linhaAtual = [];
            for (let i = 0; i < texto.length; i++) {
                let char = texto[i], prox = texto[i+1];
                if (char === '"' && emAspas && prox === '"') { celula += '"'; i++; }
                else if (char === '"') emAspas = !emAspas;
                else if (char === ',' && !emAspas) { linhaAtual.push(celula.trim()); celula = ""; }
                else if (char === '\n' && !emAspas) { linhaAtual.push(celula.trim()); linhas.push(linhaAtual); linhaAtual = []; celula = ""; }
                else if (char !== '\r') celula += char;
            }
            if (celula || linhaAtual.length > 0) { linhaAtual.push(celula.trim()); linhas.push(linhaAtual); }
            return linhas.slice(1);
        }

        fetch(CSV_URL + '&nocache=' + new Date().getTime()).then(res => res.text()).then(data => {
            const processedRows = lerCSV(data).reverse();
            const container = document.getElementById('results');

            function render(term = '') {
                const termoLimpo = term.toLowerCase().trim();
                container.innerHTML = processedRows.filter(cols => {
                    if (!cols[0]) return false;
                    const tipo = cols[0].toLowerCase(), filtro = tipoFiltro.toLowerCase();
                    if (filtro === 'lata') return tipo.includes('lata') && !tipo.includes('tampa');
                    if (filtro === 'tampa lata' || filtro === 'tampa para lata') return tipo.includes('tampa') && tipo.includes('lata');
                    return tipo.includes(filtro);
                }).filter(cols => cols.join(' ').toLowerCase().includes(termoLimpo)).map(cols => {
                    const rowData = encodeURIComponent(JSON.stringify(cols)).replace(/'/g, "%27");
                    const statusTexto = cols[6] ? cols[6].trim() : '';
                    const statusClasse = statusTexto.toLowerCase().includes('aprovado') ? 'aprovado' : 'reprovado';
                    
                    return `<div class="card" onclick="window.location.href='detalhes.html?data=' + '${rowData}'">
                                <strong>${cols[1] || '-'}</strong><br>
                                Lote: ${cols[8] || '-'} | NF: ${cols[7] || '-'}<br>
                                <span class="${statusClasse}">${statusTexto}</span>
                            </div>`;
                }).join('');
            }
            document.getElementById('search').oninput = (e) => render(e.target.value);
            render();
        });
    </script>
</body>
</html>
