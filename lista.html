<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/nNgyj0XS/icone-checkinsumos.png">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #F40009; cursor: pointer; }
        body.light-mode { background: #f4f4f4; color: #121212; }
        body.light-mode .card { background: #ffffff; border: 1px solid #ccc; color: #121212; }
    </style>
</head>
<body>
    <button onclick="history.back()">⬅ Voltar</button>
    <h2 id="titulo">Carregando...</h2>
    <input type="text" id="search" placeholder="Pesquisar...">
    <div id="results"></div>

    <script>
        const tipoFiltro = new URLSearchParams(window.location.search).get('tipo');
        document.getElementById('titulo').innerText = "Insumo: " + tipoFiltro;
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWOWdtUog954LY_EmvbNUuqBKNBrkw_NamLje4xHyOjL46iV-XYCIsekzlJPV4q7dmBDC6oSTsHs6q/pub?gid=126364406&single=true&output=csv';

        function lerCSV(texto) {
            let linhas = [], celula = "", emAspas = false, linhaAtual = [];
            for (let i = 0; i < texto.length; i++) {
                let char = texto[i], prox = texto[i+1];
                if (char === '"' && emAspas && prox === '"') { celula += '"'; i++; }
                else if (char === '"') emAspas = !emAspas;
                else if (char === ',' && !emAspas) { linhaAtual.push(celula.trim()); celula = ""; }
                else if (char === '\n' && !emAspas) { linhaAtual.push(celula.trim()); linhas.push(linhaAtual); linhaAtual = []; celula = ""; }
                else if (char !== '\r') celula += char;
            }
            if (celula || linhaAtual.length > 0) { linhaAtual.push(celula.trim()); linhas.push(linhaAtual); }
            return linhas.slice(1);
        }

        fetch(CSV_URL + '&nocache=' + new Date().getTime()).then(r => r.text()).then(data => {
            const rows = lerCSV(data).reverse();
            const container = document.getElementById('results');
            function render(term = '') {
                container.innerHTML = rows.filter(cols => {
                    const tipo = cols[0].toLowerCase();
                    if (tipoFiltro.toLowerCase() === 'lata') return tipo.includes('lata') && !tipo.includes('tampa');
                    if (tipoFiltro.toLowerCase().includes('tampa lata')) return tipo.includes('tampa') && tipo.includes('lata');
                    return tipo.includes(tipoFiltro.toLowerCase());
                }).filter(cols => cols.join(' ').toLowerCase().includes(term.toLowerCase()))
                .map(cols => `<div class="card" onclick="window.location.href='detalhes.html?data=' + encodeURIComponent(JSON.stringify(cols))">
                    <strong>${cols[1]}</strong><br>Lote: ${cols[8] || '-'} | NF: ${cols[7] || '-'}
                </div>`).join('');
            }
            document.getElementById('search').oninput = (e) => render(e.target.value);
            render();
        });
    </script>
</body>
</html>
